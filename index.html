<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texty Math</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Texty Math</h1>
  <p class="subtitle">Bills in plain text with smart totals and sorting.</p>

  <div class="toolbar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="attention">Needs Attention</button>
    <button class="filter-btn" data-filter="manual">Manual</button>
    <button class="filter-btn" data-filter="auto">Autopay</button>
    <button class="filter-btn" data-filter="paid">Paid</button>
  </div>

  <textarea id="input" placeholder="Example:
manual 3/22 Mortgage 1500
auto 3/25 Internet 80
paid 3/10 Water 45"></textarea>

  <div id="summary">
  <div class="card">
    <div class="card-label">Manual Due</div>
    <div class="card-value" id="manualTotal">$0.00</div>
  </div>
  <div class="card">
    <div class="card-label">Autopay Due</div>
    <div class="card-value" id="autoTotal">$0.00</div>
  </div>
  <div class="card">
    <div class="card-label">Paid</div>
    <div class="card-value" id="paidTotal">$0.00</div>
  </div>
  <div class="card">
    <div class="card-label">Total Due</div>
    <div class="card-value" id="grandTotal">$0.00</div>
  </div>
  <div class="card accent-card">
    <div class="card-label">Income</div>
    <div class="card-value" id="incomeTotal">$0.00</div>
  </div>
  <div class="card accent-card">
    <div class="card-label">Net</div>
    <div class="card-value" id="netTotal">$0.00</div>
  </div>
</div>

<div id="accountsCard" class="next-up-card">
  <div class="next-up-label">By Account</div>
  <div id="accountsBreakdown"></div>
</div>

  <div id="nextUpCard" class="next-up-card">
    <div class="next-up-label">Next up</div>
    <div class="next-up-value" id="nextUpValue">Nothing due</div>
  </div>

  <div id="output"></div>

  <script src="script.js?v=9"></script>
</body>
</html>
